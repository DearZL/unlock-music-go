name: Release

on:
  push:
    tags:
      - "**"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to build and publish
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Check out source
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

  release:
    name: Build and publish release
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      APP_NAME: unlock-music-go
      TAG: ${{ inputs.tag || github.ref_name }}
    steps:
      - name: Check out tagged source
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Verify selected tag
        shell: bash
        run: |
          set -euo pipefail
          git rev-parse --verify "refs/tags/${TAG}"

      - name: Build release archives
        shell: bash
        run: |
          set -euo pipefail

          rm -rf dist
          mkdir -p dist
          asset_tag="${TAG//\//-}"

          build_macos() {
            local arch="$1"
            local package="${APP_NAME}_${asset_tag}_macos_${arch}"
            local directory="dist/${package}"

            mkdir -p "${directory}"
            CGO_ENABLED=0 GOOS=darwin GOARCH="${arch}" \
              go build -trimpath -buildvcs=false -ldflags='-s -w' -o "${directory}/${APP_NAME}" .
            cp README.md LICENSE "${directory}/"
            tar -C dist -czf "dist/${package}.tar.gz" "${package}"
            rm -rf "${directory}"
          }

          build_windows() {
            local package="${APP_NAME}_${asset_tag}_windows_amd64"
            local directory="dist/${package}"

            mkdir -p "${directory}"
            CGO_ENABLED=0 GOOS=windows GOARCH=amd64 \
              go build -trimpath -buildvcs=false -ldflags='-s -w' -o "${directory}/${APP_NAME}.exe" .
            cp README.md LICENSE "${directory}/"
            (
              cd dist
              zip -qr "${package}.zip" "${package}"
            )
            rm -rf "${directory}"
          }

          build_macos amd64
          build_macos arm64
          build_windows

          (
            cd dist
            sha256sum *.tar.gz *.zip > checksums.txt
          )
          ls -lh dist

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          assets=(dist/*.tar.gz dist/*.zip dist/checksums.txt)
          prerelease=()
          if [[ "${TAG}" == *-* ]]; then
            prerelease+=(--prerelease)
          fi

          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" "${assets[@]}" --clobber
          else
            gh release create "${TAG}" "${assets[@]}" \
              --title "${TAG}" \
              --generate-notes \
              "${prerelease[@]}"
          fi
